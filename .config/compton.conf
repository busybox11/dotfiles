backend = "glx";

blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-kern = "3x3box";
blur-method = "kawase";
blur-strength = 18;

blur-background-exclude = [
	"window_type = 'desktop'",
	"_GTK_FRAME_EXTENTS@:c",
	"name = 'gnome-screenshot'",
	"class_g = 'slop'",
	"class_g = 'Peek'"
];
